<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Heda ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#070814;

font-family:Poppins,sans-serif;

overflow:hidden;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

color:white;

}

/* Background */

.hero{

width:100%;

height:100%;

display:flex;

justify-content:center;

align-items:center;

text-align:center;

position:relative;

background:

radial-gradient(circle at top,#ff6fa7 0%,#241336 45%,#070814 100%);

}

/* Soft glow */

.hero::before{

content:"";

position:absolute;

width:700px;

height:700px;

background:rgba(255,120,180,.12);

border-radius:50%;

filter:blur(120px);

}

/* Content */

.content{

position:relative;

z-index:5;

padding:20px;

}

h1{

font-family:"Great Vibes",cursive;

font-size:92px;

margin-bottom:20px;

text-shadow:0 0 35px rgba(255,255,255,.9);

}

h2{

font-size:34px;

font-weight:600;

margin-bottom:18px;

}

p{

font-size:22px;

opacity:.9;

max-width:650px;

line-height:1.8;

margin:auto;

}

</style>

</head>

<body>

<section class="hero">

<div class="content">

<h1>Happy Birthday ❤️</h1>

<h2>My Beautiful Wife, Heda</h2>

<p>

This isn't just a website...

It's a small piece of my heart,
made only for you.

</p>

</div>

</section>

</body>

</html>
