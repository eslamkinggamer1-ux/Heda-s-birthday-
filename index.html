<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Heda ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(180deg,#0b0b1f,#23133b,#ff6ea8);
font-family:Poppins,sans-serif;
color:white;
}

.hero{
text-align:center;
padding:30px;
animation:fade 2s ease;
}

h1{
font-family:'Great Vibes',cursive;
font-size:85px;
text-shadow:0 0 20px rgba(255,255,255,.8);
margin-bottom:20px;
}

h2{
font-size:32px;
margin-bottom:20px;
}

p{
font-size:20px;
max-width:650px;
margin:auto;
line-height:1.8;
margin-bottom:40px;
}

button{
padding:18px 45px;
border:none;
border-radius:50px;
background:white;
color:#ff4d88;
font-size:20px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.08);
}

@keyframes fade{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:none;
}
}

</style>
</head>

<body>

<div class="hero">

<h1>Happy Birthday ❤️</h1>

<h2>My Beautiful Wife, Heda</h2>

<p>
Today isn't just your birthday.
It's the day the world became brighter because you were born.
I made this little place just for you, with all my love.
</p>

<button>Open My Heart ❤️</button>

</div>

</body>
</html>
