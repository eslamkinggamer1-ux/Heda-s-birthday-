<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Heda ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Poppins,sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(180deg,#080814,#25153b,#ff6fa9);
overflow:hidden;
color:white;
}

.hero{
text-align:center;
padding:25px;
animation:fade 2s;
}

h1{
font-family:'Great Vibes',cursive;
font-size:85px;
text-shadow:0 0 25px white;
margin-bottom:15px;
}

h2{
font-size:34px;
margin-bottom:20px;
}

p{
font-size:20px;
line-height:1.8;
max-width:650px;
margin:auto;
margin-bottom:35px;
}

button{
padding:18px 45px;
font-size:20px;
font-weight:bold;
border:none;
border-radius:50px;
background:white;
color:#ff4d88;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.08);
}

@keyframes fade{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:none;
}
}

</style>

</head>

<body>

<div class="hero">

<h1>Happy Birthday ❤️</h1>

<h2>My Beautiful Wife, Heda</h2>

<p>
Today isn't just your birthday.
It's the day the world became more beautiful because you were born.

This little website is my gift to you, made with love.
</p>

<button>Open My Heart ❤️</button>

</div>

</body>
</html>
