<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Heda ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

font-family:Poppins,sans-serif;

background:
linear-gradient(180deg,#090816,#241339,#ff5fa2);

color:white;

}

.hero{

text-align:center;

padding:30px;

animation:fade 2s;

}

h1{

font-family:'Great Vibes',cursive;

font-size:80px;

margin-bottom:15px;

text-shadow:0 0 25px rgba(255,255,255,.9);

}

h2{

font-size:32px;

margin-bottom:20px;

}

p{

font-size:20px;

max-width:650px;

line-height:1.8;

margin:auto;

margin-bottom:40px;

}

button{

padding:18px 45px;

font-size:20px;

border:none;

border-radius:50px;

cursor:pointer;

background:white;

color:#ff4f93;

font-weight:bold;

transition:.3s;

}

button:hover{

transform:scale(1.08);

}

@keyframes fade{

from{

opacity:0;

transform:translateY(40px);

}

to{

opacity:1;

transform:none;

}

}

</style>

</head>

<body>

<div class="hero">

<h1>Happy Birthday ❤️</h1>

<h2>My Beautiful Wife, Heda</h2>

<p>

Today isn't just your birthday.

It's the day the most beautiful person entered this world.

I made something special just for you.

</p>

<button>

Open My Heart ❤️

</button>

</div>

</body>

</html>
