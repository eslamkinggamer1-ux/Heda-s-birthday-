<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Happy Birthday Heda ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{

font-family:Poppins,sans-serif;

overflow-x:hidden;

background:#0d0d1f;

color:white;

}

/* Background */

.hero{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

text-align:center;

position:relative;

overflow:hidden;

background:

linear-gradient(160deg,#ff5f9e,#ff8fc4,#ffd6ea);

}

/* Floating circles */

.circle{

position:absolute;

border-radius:50%;

background:rgba(255,255,255,.15);

animation:float 10s linear infinite;

}

.circle:nth-child(1){

width:220px;
height:220px;

top:-50px;
left:-70px;

}

.circle:nth-child(2){

width:140px;
height:140px;

right:5%;
top:15%;

animation-duration:15s;

}

.circle:nth-child(3){

width:280px;
height:280px;

bottom:-120px;
right:-100px;

animation-duration:18s;

}

@keyframes float{

0%{

transform:translateY(0px);

}

50%{

transform:translateY(-30px);

}

100%{

transform:translateY(0px);

}

}

.content{

position:relative;

z-index:2;

padding:25px;

}

h1{

font-family:'Great Vibes',cursive;

font-size:82px;

text-shadow:0 0 25px rgba(255,255,255,.8);

margin-bottom:20px;

animation:fadeDown 1.8s;

}

h2{

font-size:34px;

font-weight:600;

margin-bottom:25px;

animation:fadeUp 2s;

}

.hero p{

font-size:20px;

max-width:700px;

margin:auto;

line-height:1.9;

animation:fadeUp 2.5s;

}

@keyframes fadeDown{

from{

opacity:0;

transform:translateY(-60px);

}

to{

opacity:1;

transform:none;

}

}

@keyframes fadeUp{

from{

opacity:0;

transform:translateY(60px);

}

to{

opacity:1;

transform:none;

}

}

button{

margin-top:45px;

padding:18px 45px;

border:none;

border-radius:50px;

font-size:20px;

font-weight:bold;

background:white;

color:#ff4f93;

cursor:pointer;

transition:.35s;

box-shadow:0 0 35px rgba(255,255,255,.5);

}

button:hover{

transform:scale(1.08);

box-shadow:0 0 55px white;

}

</style>

</head>

<body>

<section class="hero">

<div class="circle"></div>

<div class="circle"></div>

<div class="circle"></div>

<div class="content">

<h1>Happy Birthday ❤️</h1>

<h2>My Beautiful Wife, Heda</h2>

<p>

Today isn't just another birthday.

Today is the day my favorite person came into this world.

And today...

I have something waiting for you.

</p>

<button id="startButton">

Open My Heart ❤️

</button>

</div>

</section>
