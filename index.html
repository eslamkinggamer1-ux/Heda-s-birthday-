<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Happy Birthday Heda ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#070914;

overflow:hidden;

height:100vh;

font-family:Poppins,sans-serif;

display:flex;

justify-content:center;

align-items:center;

color:white;

}

/* Background */

.background{

position:fixed;

width:100%;

height:100%;

background:
radial-gradient(circle at top,#ff6aa8 0%,#12152b 60%,#05060f 100%);

overflow:hidden;

}

/* Stars */

.star{

position:absolute;

background:white;

border-radius:50%;

animation:twinkle 2s infinite alternate;

}

.star:nth-child(1){

top:10%;
left:15%;
width:3px;
height:3px;

}

.star:nth-child(2){

top:20%;
right:20%;
width:2px;
height:2px;

animation-delay:1s;

}

.star:nth-child(3){

bottom:25%;
left:30%;
width:4px;
height:4px;

animation-delay:.5s;

}

.star:nth-child(4){

bottom:15%;
right:15%;
width:3px;
height:3px;

animation-delay:2s;

}

@keyframes twinkle{

from{

opacity:.2;

transform:scale(.8);

}

to{

opacity:1;

transform:scale(1.5);

}

}

/* Center */

.center{

position:relative;

z-index:5;

text-align:center;

opacity:0;

animation:show 2s forwards;

animation-delay:1s;

}

@keyframes show{

to{

opacity:1;

}

}

h1{

font-family:'Great Vibes',cursive;

font-size:85px;

text-shadow:0 0 25px white;

margin-bottom:20px;

}

p{

font-size:24px;

font-weight:300;

letter-spacing:2px;

margin-top:10px;

opacity:.9;

}
/* Heart */

.heart{
font-size:90px;
margin-top:45px;
animation:heartbeat 1.4s infinite;
filter:drop-shadow(0 0 25px #ff5f9e);
}

@keyframes heartbeat{

0%{
transform:scale(1);
}

20%{
transform:scale(1.15);
}

40%{
transform:scale(.95);
}

60%{
transform:scale(1.2);
}

100%{
transform:scale(1);
}

  }
  /* Floating Hearts */

.floating-heart{

position:absolute;

color:#ff6ea8;

font-size:22px;

opacity:.8;

animation:rise linear infinite;

pointer-events:none;

}

.floating-heart:nth-child(1){
left:8%;
animation-duration:10s;
animation-delay:0s;
}

.floating-heart:nth-child(2){
left:22%;
animation-duration:12s;
animation-delay:3s;
}

.floating-heart:nth-child(3){
left:38%;
animation-duration:11s;
animation-delay:1s;
}

.floating-heart:nth-child(4){
left:56%;
animation-duration:13s;
animation-delay:2s;
}

.floating-heart:nth-child(5){
left:73%;
animation-duration:10s;
animation-delay:4s;
}

.floating-heart:nth-child(6){
left:88%;
animation-duration:14s;
animation-delay:1s;
}

@keyframes rise{

0%{

transform:translateY(120vh) scale(.6);

opacity:0;

}

20%{

opacity:.9;

}

100%{

transform:translateY(-120vh) scale(1.3);

opacity:0;

}

  }
</style>

</head>

<body>

<div class="background">

<div class="star"></div>

<div class="star"></div>

<div class="star"></div>

<div class="star"></div>

</div>

<div class="center">

<h1>Happy Birthday ❤️</h1>

<p>For My Beautiful Wife, Heda</p>

<div class="heart">
❤
  </div>
